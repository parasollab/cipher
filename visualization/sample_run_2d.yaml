# CIPHER sample planning log — 2D environment
# Three robots navigating a 3x2 grid (6 cells).
# state vector:   [x, y, theta]   (first 2 components used for visualization)
# control vector: [v, omega]      (forward speed, angular velocity)
#
# Grid layout:
#   c3[0-2, 2-4]   c4[2-4, 2-4]   c5[4-6, 2-4]
#   c0[0-2, 0-2]   c1[2-4, 0-2]   c2[4-6, 0-2]
#
# Events: MAPF -> low-level paths -> segments -> collision ->
#         grid refinement (split c1) -> coupled planning ->
#         MAPF (2) -> low-level paths (2) -> segments (2)

header:
  dimensions: 2

  robots:
    - id: r0
      dynamics: first_order_unicycle
      geometry: {type: sphere, radius: 0.12}
      start: [0.5, 0.5, 0.0]
      goal:  [5.5, 3.5, 0.0]
    - id: r1
      dynamics: first_order_unicycle
      geometry: {type: sphere, radius: 0.12}
      start: [5.5, 0.5, 0.0]
      goal:  [0.5, 3.5, 0.0]
    - id: r2
      dynamics: first_order_unicycle
      geometry: {type: sphere, radius: 0.12}
      start: [3.0, 0.5, 0.0]
      goal:  [3.0, 3.5, 0.0]

  grid:
    cells:
      - id: c0
        bounds:
          min: [0.0, 0.0, -0.01]
          max: [2.0, 2.0,  0.01]
      - id: c1
        bounds:
          min: [2.0, 0.0, -0.01]
          max: [4.0, 2.0,  0.01]
      - id: c2
        bounds:
          min: [4.0, 0.0, -0.01]
          max: [6.0, 2.0,  0.01]
      - id: c3
        bounds:
          min: [0.0, 2.0, -0.01]
          max: [2.0, 4.0,  0.01]
      - id: c4
        bounds:
          min: [2.0, 2.0, -0.01]
          max: [4.0, 4.0,  0.01]
      - id: c5
        bounds:
          min: [4.0, 2.0, -0.01]
          max: [6.0, 4.0,  0.01]

events:
  # -------------------------------------------------------------------------
  # Round 1: initial high-level MAPF plan
  # -------------------------------------------------------------------------
  - type: mapf
    paths:
      r0: [c0, c1, c4, c5]   # bottom-left to top-right
      r1: [c2, c1, c4, c3]   # bottom-right to top-left
      r2: [c1, c4]            # straight up through centre

  # -------------------------------------------------------------------------
  # Round 1: low-level paths
  # state:    [x, y, theta]   (first_order_unicycle in 2D — 3-component state)
  # control:  [v, omega]      (forward speed, angular velocity)
  # duration: travel time from this waypoint to the next (0.0 = terminal)
  # -------------------------------------------------------------------------
  - type: low_level_paths
    paths:
      r0:
        - state:    [0.5,  0.5,  0.785]
          control:  [1.2,  0.0]
          duration: 0.8
        - state:    [1.5,  1.2,  0.6]
          control:  [1.1,  -0.2]
          duration: 0.9
        - state:    [2.5,  1.5,  0.4]
          control:  [1.3,  0.7]
          duration: 0.8
        - state:    [3.5,  2.5,  1.1]
          control:  [1.1,  -0.8]
          duration: 0.7
        - state:    [4.5,  3.0,  0.3]
          control:  [1.2,  0.0]
          duration: 0.6
        - state:    [5.5,  3.5,  0.0]
          control:  [0.0,  0.0]
          duration: 0.0
      r1:
        - state:    [5.5,  0.5,  2.356]
          control:  [1.2,  0.0]
          duration: 0.8
        - state:    [4.8,  1.2,  2.5]
          control:  [1.0,  0.2]
          duration: 0.9
        - state:    [3.5,  1.5,  2.7]
          control:  [1.3,  -0.7]
          duration: 0.8
        - state:    [2.5,  2.5,  2.5]
          control:  [1.1,  0.8]
          duration: 0.7
        - state:    [1.5,  3.0,  2.8]
          control:  [1.2,  0.0]
          duration: 0.6
        - state:    [0.5,  3.5,  3.14]
          control:  [0.0,  0.0]
          duration: 0.0
      r2:
        - state:    [3.0,  0.5,  1.571]
          control:  [1.0,  0.0]
          duration: 1.0
        - state:    [3.0,  1.5,  1.571]
          control:  [1.0,  0.0]
          duration: 0.8
        - state:    [3.0,  2.5,  1.571]
          control:  [1.0,  0.0]
          duration: 0.8
        - state:    [3.0,  3.5,  1.571]
          control:  [0.0,  0.0]
          duration: 0.0

  # -------------------------------------------------------------------------
  # Round 1: segmentation (one segment per cell)
  # -------------------------------------------------------------------------
  - type: segments
    segments:
      r0:
        - [0, 2]    # c0
        - [2, 4]    # c1 + c4
        - [4, 5]    # c5
      r1:
        - [0, 2]    # c2
        - [2, 4]    # c1 + c4
        - [4, 5]    # c3
      r2:
        - [0, 2]    # c1
        - [2, 3]    # c4

  # -------------------------------------------------------------------------
  # Collision: r0, r1, and r2 all pass through c1 near t = 1.5s
  # -------------------------------------------------------------------------
  - type: collision
    robots: [r0, r1, r2]
    time: 1.5

  # -------------------------------------------------------------------------
  # Refine grid: split c1 into four sub-cells
  # -------------------------------------------------------------------------
  - type: grid_update
    removed: [c1]
    cells:
      - id: c1a
        bounds:
          min: [2.0, 0.0, -0.01]
          max: [3.0, 1.0,  0.01]
      - id: c1b
        bounds:
          min: [3.0, 0.0, -0.01]
          max: [4.0, 1.0,  0.01]
      - id: c1c
        bounds:
          min: [2.0, 1.0, -0.01]
          max: [3.0, 2.0,  0.01]
      - id: c1d
        bounds:
          min: [3.0, 1.0, -0.01]
          max: [4.0, 2.0,  0.01]

  # -------------------------------------------------------------------------
  # Coupled planning: all three robots planned jointly through the collision region
  # -------------------------------------------------------------------------
  - type: coupled_planning
    groups:
      - robots: [r0, r1, r2]
        cells: [c1a, c1b, c1c, c1d, c4]

  # -------------------------------------------------------------------------
  # Round 2: updated MAPF routing robots around each other
  # -------------------------------------------------------------------------
  - type: mapf
    paths:
      r0: [c0, c1a, c1d, c4, c5]   # r0 takes lower-right sub-path through c1
      r1: [c2, c1b, c1c, c4, c3]   # r1 takes upper-left sub-path through c1
      r2: [c1c, c1d, c4]            # r2 stays to the right in c1

  # -------------------------------------------------------------------------
  # Round 2: new low-level paths that resolve the collision
  # -------------------------------------------------------------------------
  - type: low_level_paths
    paths:
      r0:
        - state:    [0.5,  0.5,  0.6]
          control:  [1.1,  -0.2]
          duration: 0.9
        - state:    [1.8,  0.8,  0.3]
          control:  [1.0,  -0.2]
          duration: 0.7
        - state:    [2.5,  0.6,  0.1]
          control:  [1.2,  1.1]
          duration: 0.6
        - state:    [3.5,  1.4,  1.2]
          control:  [1.1,  0.2]
          duration: 0.7
        - state:    [3.5,  2.8,  1.4]
          control:  [1.3,  -1.0]
          duration: 0.6
        - state:    [5.5,  3.5,  0.3]
          control:  [0.0,  0.0]
          duration: 0.0
      r1:
        - state:    [5.5,  0.5,  2.5]
          control:  [1.1,  0.2]
          duration: 0.9
        - state:    [4.5,  0.8,  2.7]
          control:  [1.0,  0.2]
          duration: 0.7
        - state:    [3.5,  0.6,  2.9]
          control:  [1.2,  -1.1]
          duration: 0.6
        - state:    [2.5,  1.4,  2.0]
          control:  [1.1,  -0.2]
          duration: 0.7
        - state:    [1.5,  2.8,  2.8]
          control:  [1.3,  1.0]
          duration: 0.6
        - state:    [0.5,  3.5,  3.14]
          control:  [0.0,  0.0]
          duration: 0.0
      r2:
        - state:    [3.0,  0.5,  1.571]
          control:  [1.0,  0.0]
          duration: 0.5
        - state:    [3.0,  1.0,  1.571]
          control:  [1.0,  0.5]
          duration: 0.6
        - state:    [3.5,  1.8,  1.0]
          control:  [1.2,  -0.5]
          duration: 0.7
        - state:    [3.0,  3.5,  1.571]
          control:  [0.0,  0.0]
          duration: 0.0

  # -------------------------------------------------------------------------
  # Round 2: segmentation of the resolved paths
  # -------------------------------------------------------------------------
  - type: segments
    segments:
      r0:
        - [0, 2]    # c0
        - [2, 3]    # c1a
        - [3, 4]    # c1d
        - [4, 5]    # c4 + c5
      r1:
        - [0, 2]    # c2
        - [2, 3]    # c1b
        - [3, 4]    # c1c
        - [4, 5]    # c4 + c3
      r2:
        - [0, 1]    # c1c
        - [1, 2]    # c1d
        - [2, 3]    # c4
