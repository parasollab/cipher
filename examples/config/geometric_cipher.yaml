# mapf_method: cbs   # "cbs" (default) or "astar" (independent A*, faster but ignores conflicts)
timelimit: 600
max_total_time: 0
seed: -1
region_size: 5
robot_cell_size_ratio: 1.3
cbs_capacity: 1
max_obstacle_volume_percent: 0.5
max_initial_extensions: 1000
max_blocked_edge_retries: 5
max_no_progress_iters: 20
restrict_sampling_to_cell: false
cbs_timeout: 1.0
check_transition_feasibility: true
transition_feasibility_robot_size_multiplier: 1.2
goal_bias: 0.3
goal_threshold: 0.1